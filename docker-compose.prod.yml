services:
  nginx:
    image: nginx:latest
    container_name: mb-nginx
    restart: always
    ports:
      - "127.0.0.1:8081:80"
    links:
      - php
    depends_on:
      - php
    volumes:
      - ./php/:/var/www/html/
      - ./logs/nginx:/var/log/nginx/
    networks:
      - mb_network

  php:
    build:
      context: .
      dockerfile: local/php/php-fpm/Dockerfile
    image: mb-php:prod
    container_name: mb-php
    restart: always
    links:
      - mariadb
    depends_on:
      - mariadb
    volumes:
      - ./php/:/var/www/html/
      - ./logs/php/php.log:/var/log/fpm-php.www.log
    networks:
      - mb_network
    environment:
      - YII_DEBUG=false
      - APP_ENV=prod

  mariadb:
    container_name: mb-mariadb
    image: mariadb:10.2
    restart: on-failure
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - ./mariadb:/var/lib/mysql
    networks:
      - mb_network

  redis:
    image: redis:latest
    container_name: mb-redis
    restart: always
    networks:
      - mb_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: mb-phpmyadmin
    restart: always
    depends_on:
      - mariadb
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - mb_network

networks:
  mb_network:
    driver: bridge
